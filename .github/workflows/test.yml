name: Python Package Linux

on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: [3.9, "3.10", "3.11", "3.12"]
        database: [sqlite, mysql]
        exclude:
          # MySQL tests only run on ubuntu-latest to reduce CI time
          - os: macos-latest
            database: mysql

    services:
      mysql:
        image: ${{ matrix.database == 'mysql' && 'mysql:8.0' || '' }}
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: ingestify_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[test]"
    - name: Install MySQL dependencies
      if: matrix.database == 'mysql'
      run: |
        pip install mysqlclient
    - name: Code formatting
      run: |
        pip install black==22.3.0
        black --check .
    - name: Test with pytest (SQLite)
      if: matrix.database == 'sqlite'
      run: |
        pytest --color=yes
    - name: Test with pytest (MySQL)
      if: matrix.database == 'mysql'
      env:
        INGESTIFY_TEST_DATABASE_URL: mysql://root:root@127.0.0.1:3306/ingestify_test
      run: |
        pytest --color=yes
